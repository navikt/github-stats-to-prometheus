version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      gradle:
        patterns: 
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      github:
        patterns: 
          - "*"
